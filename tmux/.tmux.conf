# =============================================================================
# TMUX CONFIG
# prefix key is Ctrl+a (press this before every tmux command)
# reload config: prefix + r
# =============================================================================


# =============================================================================
# PREFIX KEY
# change from default Ctrl+b to Ctrl+a (easier to reach)
# =============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix          # Ctrl+a Ctrl+a sends Ctrl+a to the terminal


# =============================================================================
# GENERAL
# =============================================================================

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true colour support

set -g mouse on               # click to switch panes, scroll with trackpad
set -g base-index 1           # number windows from 1 not 0 (easier to reach)
set -g pane-base-index 1      # same for panes
set -g history-limit 10000    # scrollback buffer
set -g escape-time 0          # no delay after pressing Esc (important for nvim)
set -g focus-events on        # lets nvim know when it gains/loses focus


# =============================================================================
# KEYBINDINGS
# all require prefix (Ctrl+a) first unless noted
# =============================================================================

# reload config without restarting tmux
# usage: prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# split panes — more intuitive keys than the defaults (% and ")
# usage: prefix + | to split vertically (left/right)
# usage: prefix + - to split horizontally (top/bottom)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# navigate between panes with hjkl (same as neovim)
# usage: prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
# usage: prefix + H/J/K/L (shift + hjkl)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# new window
# usage: prefix + c
# (default, just documenting it here)

# switch windows
# usage: prefix + number (e.g. prefix + 1, prefix + 2)
# usage: prefix + n (next window)
# usage: prefix + p (previous window)

# close current pane
# usage: prefix + x  (will ask to confirm)

# detach from session (session keeps running in background)
# usage: prefix + d
# reattach: tmux attach


# =============================================================================
# STATUS BAR
# shows: session name | windows | right: date + time
# =============================================================================

set -g status-position bottom
set -g status-interval 5              # refresh every 5 seconds

# rose-pine dawn colours
set -g status-style "bg=#f2e9e1,fg=#575279"
set -g window-status-current-style "bg=#dfdad9,fg=#575279,bold"
set -g pane-border-style "fg=#dfdad9"
set -g pane-active-border-style "fg=#907aa9"   # iris — active pane highlight

# left: session name
set -g status-left " #S "
set -g status-left-style "bg=#907aa9,fg=#faf4ed,bold"
set -g status-left-length 20

# right: date and time
set -g status-right " %d %b %H:%M "
set -g status-right-style "bg=#f2e9e1,fg=#9893a5"
